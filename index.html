<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Health Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@1.3.1/dist/chartjs-plugin-zoom.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-6">
  <div class="max-w-4xl w-full bg-white p-8 rounded-3xl shadow-xl border border-gray-200">

    <!-- Title -->
    <h1 class="text-3xl font-bold text-center text-indigo-600 mb-6">Health Tracker</h1>

    <!-- Add Reading Form -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
      <input id="systolic" type="number" placeholder="Systolic (Upper)" class="border rounded-xl px-4 py-3 w-full" min="30" max="180" />
      <input id="diastolic" type="number" placeholder="Diastolic (Lower)" class="border rounded-xl px-4 py-3 w-full" min="30" max="180" />
      <input id="heartRate" type="number" placeholder="Heart Rate" class="border rounded-xl px-4 py-3 w-full" min="30" max="200" />
    </div>
    <button onclick="addReading()" class="w-full bg-indigo-500 text-white px-4 py-3 rounded-xl hover:bg-indigo-600 transition font-semibold shadow-md mb-4">
      Add Reading
    </button>

 <button id="grokMicBtn" onclick="recordAndParse()" 
  class="w-full bg-green-500 text-white px-4 py-3 rounded-xl hover:bg-green-600 transition font-semibold shadow-md mb-4">
  🎤 Speak All Readings (Grok)
</button>


    <!-- Controls -->
    <div class="flex flex-col sm:flex-row justify-between items-center gap-2">
      <select id="dateRange" onchange="filterReadings()" class="border rounded-lg px-3 py-2">
        <option value="7">Last 7 days</option>
        <option value="30">Last 30 days</option>
        <option value="all">All</option>
      </select>
    </div>

    <!-- BP Chart -->
    <div class="mt-8 bg-gray-50 p-4 rounded-2xl shadow-inner w-full" style="min-height: 300px; height: 400px;">
      <canvas id="bpChart"></canvas>
    </div>

    <!-- HR Chart -->
    <div class="mt-8 bg-gray-50 p-4 rounded-2xl shadow-inner w-full" style="min-height: 300px; height: 400px;">
      <canvas id="hrChart"></canvas>
    </div>

  </div>

  <script>
    let readings = [];
    let bpChart, hrChart;

    async function fetchReadings() {
      const res = await fetch('/api/readings');
      readings = await res.json();
      filterReadings(); // default filter to last 7 days
    }

    function parseDate(dateStr) {
      const parsed = new Date(dateStr);
      return isNaN(parsed) ? new Date() : parsed;
    }

    function filterReadings() {
      const range = document.getElementById('dateRange').value;
      if (range === 'all') {
        updateCharts(readings);
        return;
      }
      const cutoff = new Date();
      cutoff.setHours(0,0,0,0);
      cutoff.setDate(cutoff.getDate() - parseInt(range));

      const filtered = readings.filter(r => parseDate(r.date) >= cutoff);
      updateCharts(filtered);
      resetZoomAll();
    }

    function updateCharts(data) {
      const labels = data.map(r => r.date);
      const systolic = data.map(r => r.systolic);
      const diastolic = data.map(r => r.diastolic);
      const heartRate = data.map(r => r.heartRate);

      bpChart.data.labels = labels;
      bpChart.data.datasets[0].data = systolic;
      bpChart.data.datasets[1].data = diastolic;
      bpChart.update();

      hrChart.data.labels = labels;
      hrChart.data.datasets[0].data = heartRate;
      hrChart.update();
    }

    function syncCharts(sourceChart, targetChart) {
      const sourceScale = sourceChart.scales.x;
      targetChart.options.scales.x.min = sourceScale.min;
      targetChart.options.scales.x.max = sourceScale.max;
      targetChart.update('none');
    }

    function resetZoomAll() {
      bpChart.resetZoom();
      hrChart.resetZoom();
    }

    async function addReading() {
      const systolic = document.getElementById('systolic').value;
      const diastolic = document.getElementById('diastolic').value;
      const heartRate = document.getElementById('heartRate').value;
      if (!systolic || !diastolic || !heartRate) {
        alert('Please enter all values');
        return;
      }
      const res = await fetch('/api/readings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ systolic, diastolic, heartRate })
      });
      const newReading = await res.json();
      readings.push(newReading);
      filterReadings();
      document.getElementById('systolic').value = '';
      document.getElementById('diastolic').value = '';
      document.getElementById('heartRate').value = '';
    }

    document.addEventListener('DOMContentLoaded', () => {
      const bpCtx = document.getElementById('bpChart').getContext('2d');
      const hrCtx = document.getElementById('hrChart').getContext('2d');

      bpChart = new Chart(bpCtx, {
        type: 'line',
        data: { labels: [], datasets: [
          { label: 'Systolic', data: [], borderColor: 'red', fill: true, backgroundColor: 'rgba(255,0,0,0.1)', tension: 0.3 },
          { label: 'Diastolic', data: [], borderColor: 'blue', fill: true, backgroundColor: 'rgba(0,0,255,0.1)', tension: 0.3 }
        ]},
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            zoom: {
              pan: { enabled: true, mode: 'x', onPan: ({chart}) => syncCharts(chart, hrChart) },
              zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: 'x', onZoom: ({chart}) => syncCharts(chart, hrChart) }
            }
          }
        }
      });

      hrChart = new Chart(hrCtx, {
        type: 'line',
        data: { labels: [], datasets: [
          { label: 'Heart Rate', data: [], borderColor: 'green', fill: true, backgroundColor: 'rgba(0,128,0,0.1)', tension: 0.3 }
        ]},
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            zoom: {
              pan: { enabled: true, mode: 'x', onPan: ({chart}) => syncCharts(chart, bpChart) },
              zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: 'x', onZoom: ({chart}) => syncCharts(chart, bpChart) }
            }
          }
        }
      });

      fetchReadings();
    });
  
async function recordAndParse() {
  const btn = document.querySelector('#grokMicBtn');

  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('Your browser does not support voice input.');
    return;
  }

  const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const recognition = new Recognition();
  recognition.lang = 'en-US';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.start();
  btn.textContent = '🎙 Listening...';
  btn.classList.remove('bg-green-500', 'hover:bg-green-600');
  btn.classList.add('bg-red-500', 'hover:bg-red-600');

  recognition.onresult = async function(event) {
    const spokenText = event.results[0][0].transcript;
    console.log("Transcript:", spokenText);

    btn.textContent = '⏳ Processing...';
    btn.classList.remove('bg-red-500', 'hover:bg-red-600');
    btn.classList.add('bg-yellow-500');

    try {
      const res = await fetch('/api/parse-readings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ transcript: spokenText })
      });

      const data = await res.json();
      if (data.systolic) document.getElementById('systolic').value = data.systolic;
      if (data.diastolic) document.getElementById('diastolic').value = data.diastolic;
      if (data.heartRate) document.getElementById('heartRate').value = data.heartRate;

    } catch (err) {
      alert('Error processing with Grok API.');
      console.error(err);
    }

    btn.textContent = '🎤 Speak All Readings (Grok)';
    btn.classList.remove('bg-yellow-500');
    btn.classList.add('bg-green-500', 'hover:bg-green-600');
  };

  recognition.onerror = function(event) {
    alert('Speech recognition error: ' + event.error);
    btn.textContent = '🎤 Speak All Readings (Grok)';
    btn.classList.remove('bg-red-500', 'hover:bg-red-600');
    btn.classList.add('bg-green-500', 'hover:bg-green-600');
  };
}
</script>
<script src="/app.js"></script>

</body>
</html>
